<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 445" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">

  <rect width="860" height="445" rx="16" fill="#FFFFFF"/>

  <text x="430" y="36" text-anchor="middle" fill="#1A1410" font-size="20" font-weight="700">The Seven Deadly Patterns</text>
  <text x="430" y="56" text-anchor="middle" fill="#6B5E4A" font-size="12">Recurring vulnerability classes found across all eight benchmarks</text>

  <!-- ROW 1: Patterns 1–4 -->

  <!-- Pattern 1 -->
  <rect x="21" y="75" width="197" height="75" rx="10" fill="#FCF0F0" stroke="#C04040" stroke-width="1.5"/>
  <circle cx="42" cy="112" r="13" fill="#FCE0E0" stroke="#C04040" stroke-width="1.5"/>
  <text x="42" y="117" text-anchor="middle" fill="#7A2020" font-size="13" font-weight="800">1</text>
  <text x="64" y="97" fill="#1A1410" font-size="10" font-weight="600">No Agent/Evaluator Isolation</text>
  <text x="64" y="122" fill="#9C8F7A" font-size="9">Agent and evaluator share</text>
  <text x="64" y="135" fill="#9C8F7A" font-size="9">the same execution env</text>

  <!-- Pattern 2 -->
  <rect x="228" y="75" width="197" height="75" rx="10" fill="#FDF0E8" stroke="#D46030" stroke-width="1.5"/>
  <circle cx="249" cy="112" r="13" fill="#FDE0C8" stroke="#D46030" stroke-width="1.5"/>
  <text x="249" y="117" text-anchor="middle" fill="#7C3010" font-size="13" font-weight="800">2</text>
  <text x="271" y="91" fill="#1A1410" font-size="10" font-weight="600">Answers Shipped</text>
  <text x="271" y="104" fill="#1A1410" font-size="10" font-weight="600">With the Test</text>
  <text x="271" y="122" fill="#9C8F7A" font-size="9">Reference answers in task config</text>
  <text x="271" y="135" fill="#9C8F7A" font-size="9">or public URLs</text>

  <!-- Pattern 3 -->
  <rect x="435" y="75" width="197" height="75" rx="10" fill="#FDF8E0" stroke="#C09018" stroke-width="1.5"/>
  <circle cx="456" cy="112" r="13" fill="#FCF0C0" stroke="#C09018" stroke-width="1.5"/>
  <text x="456" y="117" text-anchor="middle" fill="#7A5800" font-size="13" font-weight="800">3</text>
  <text x="478" y="97" fill="#1A1410" font-size="10" font-weight="600">eval() on Untrusted Input</text>
  <text x="478" y="122" fill="#9C8F7A" font-size="9">Arbitrary code execution</text>
  <text x="478" y="135" fill="#9C8F7A" font-size="9">on the grading machine</text>

  <!-- Pattern 4 -->
  <rect x="642" y="75" width="197" height="75" rx="10" fill="#F4F0FC" stroke="#7840C0" stroke-width="1.5"/>
  <circle cx="663" cy="112" r="13" fill="#E8E0F8" stroke="#7840C0" stroke-width="1.5"/>
  <text x="663" y="117" text-anchor="middle" fill="#481880" font-size="13" font-weight="800">4</text>
  <text x="685" y="97" fill="#1A1410" font-size="10" font-weight="600">Unsanitized LLM Judge Inputs</text>
  <text x="685" y="122" fill="#9C8F7A" font-size="9">Prompt injection into</text>
  <text x="685" y="135" fill="#9C8F7A" font-size="9">the evaluation LLM</text>

  <!-- ROW 2: Patterns 5–7 centered -->

  <!-- Pattern 5 -->
  <rect x="125" y="162" width="197" height="75" rx="10" fill="#F0F4FC" stroke="#2E6BA0" stroke-width="1.5"/>
  <circle cx="146" cy="199" r="13" fill="#D8E8F8" stroke="#2E6BA0" stroke-width="1.5"/>
  <text x="146" y="204" text-anchor="middle" fill="#1A3E6A" font-size="13" font-weight="800">5</text>
  <text x="168" y="184" fill="#1A1410" font-size="10" font-weight="600">Weak String Matching</text>
  <text x="168" y="209" fill="#9C8F7A" font-size="9">Substring checks,</text>
  <text x="168" y="222" fill="#9C8F7A" font-size="9">over-aggressive normalization</text>

  <!-- Pattern 6 -->
  <rect x="332" y="162" width="197" height="75" rx="10" fill="#F0F8FC" stroke="#1890A8" stroke-width="1.5"/>
  <circle cx="353" cy="199" r="13" fill="#D0EEF8" stroke="#1890A8" stroke-width="1.5"/>
  <text x="353" y="204" text-anchor="middle" fill="#104860" font-size="13" font-weight="800">6</text>
  <text x="375" y="178" fill="#1A1410" font-size="10" font-weight="600">Evaluation Logic That</text>
  <text x="375" y="191" fill="#1A1410" font-size="10" font-weight="600">Doesn't Evaluate</text>
  <text x="375" y="209" fill="#9C8F7A" font-size="9">Scoring code is broken,</text>
  <text x="375" y="222" fill="#9C8F7A" font-size="9">skipped, or dead</text>

  <!-- Pattern 7 -->
  <rect x="539" y="162" width="197" height="75" rx="10" fill="#FCF0F4" stroke="#C03468" stroke-width="1.5"/>
  <circle cx="560" cy="199" r="13" fill="#F8D8E8" stroke="#C03468" stroke-width="1.5"/>
  <text x="560" y="204" text-anchor="middle" fill="#801840" font-size="13" font-weight="800">7</text>
  <text x="582" y="178" fill="#1A1410" font-size="10" font-weight="600">Trusting Output of</text>
  <text x="582" y="191" fill="#1A1410" font-size="10" font-weight="600">Untrusted Code</text>
  <text x="582" y="209" fill="#9C8F7A" font-size="9">Test results generated</text>
  <text x="582" y="222" fill="#9C8F7A" font-size="9">in agent-controlled env</text>

  <!-- Benchmark matrix -->
  <rect x="50" y="255" width="760" height="175" rx="10" fill="#F5F0E8" stroke="#C0B0A0" stroke-width="1"/>
  <text x="430" y="276" text-anchor="middle" fill="#9C8F7A" font-size="11" font-weight="600">Which patterns affect which benchmarks?</text>

  <!-- Column headers -->
  <text x="270" y="298" text-anchor="middle" fill="#6B5E4A" font-size="9" font-weight="600">SWE</text>
  <text x="320" y="298" text-anchor="middle" fill="#6B5E4A" font-size="9" font-weight="600">Web</text>
  <text x="370" y="298" text-anchor="middle" fill="#6B5E4A" font-size="9" font-weight="600">OS</text>
  <text x="420" y="298" text-anchor="middle" fill="#6B5E4A" font-size="9" font-weight="600">Term</text>
  <text x="470" y="298" text-anchor="middle" fill="#6B5E4A" font-size="9" font-weight="600">Field</text>
  <text x="520" y="298" text-anchor="middle" fill="#6B5E4A" font-size="9" font-weight="600">GAIA</text>
  <text x="570" y="298" text-anchor="middle" fill="#6B5E4A" font-size="9" font-weight="600">CAR</text>

  <!-- Row: No isolation -->
  <text x="190" y="317" text-anchor="end" fill="#7A2020" font-size="9">No isolation</text>
  <circle cx="270" cy="313" r="5" fill="#C04040"/><circle cx="320" cy="313" r="5" fill="#C04040"/><circle cx="370" cy="313" r="5" fill="#C04040"/><circle cx="420" cy="313" r="5" fill="#C04040"/>
  <circle cx="470" cy="313" r="5" fill="#D0C8BC"/><circle cx="520" cy="313" r="5" fill="#D0C8BC"/><circle cx="570" cy="313" r="5" fill="#D0C8BC"/>

  <!-- Row: Answers leaked -->
  <text x="190" y="333" text-anchor="end" fill="#7C3010" font-size="9">Answers leaked</text>
  <circle cx="270" cy="329" r="5" fill="#D0C8BC"/><circle cx="320" cy="329" r="5" fill="#D46030"/><circle cx="370" cy="329" r="5" fill="#D46030"/>
  <circle cx="420" cy="329" r="5" fill="#D0C8BC"/><circle cx="470" cy="329" r="5" fill="#D0C8BC"/><circle cx="520" cy="329" r="5" fill="#D46030"/>
  <circle cx="570" cy="329" r="5" fill="#D0C8BC"/>

  <!-- Row: eval() RCE -->
  <text x="190" y="349" text-anchor="end" fill="#7A5800" font-size="9">eval() RCE</text>
  <circle cx="270" cy="345" r="5" fill="#D0C8BC"/><circle cx="320" cy="345" r="5" fill="#C09018"/><circle cx="370" cy="345" r="5" fill="#C09018"/>
  <circle cx="420" cy="345" r="5" fill="#D0C8BC"/><circle cx="470" cy="345" r="5" fill="#D0C8BC"/><circle cx="520" cy="345" r="5" fill="#D0C8BC"/>
  <circle cx="570" cy="345" r="5" fill="#D0C8BC"/>

  <!-- Row: LLM judge injection -->
  <text x="190" y="365" text-anchor="end" fill="#481880" font-size="9">LLM judge injection</text>
  <circle cx="270" cy="361" r="5" fill="#D0C8BC"/><circle cx="320" cy="361" r="5" fill="#7840C0"/>
  <circle cx="370" cy="361" r="5" fill="#D0C8BC"/><circle cx="420" cy="361" r="5" fill="#D0C8BC"/><circle cx="470" cy="361" r="5" fill="#D0C8BC"/>
  <circle cx="520" cy="361" r="5" fill="#D0C8BC"/><circle cx="570" cy="361" r="5" fill="#7840C0"/>

  <!-- Row: Weak string matching -->
  <text x="190" y="381" text-anchor="end" fill="#1A3E6A" font-size="9">Weak matching</text>
  <circle cx="270" cy="377" r="5" fill="#D0C8BC"/><circle cx="320" cy="377" r="5" fill="#2E6BA0"/><circle cx="370" cy="377" r="5" fill="#D0C8BC"/>
  <circle cx="420" cy="377" r="5" fill="#D0C8BC"/><circle cx="470" cy="377" r="5" fill="#D0C8BC"/><circle cx="520" cy="377" r="5" fill="#2E6BA0"/>
  <circle cx="570" cy="377" r="5" fill="#D0C8BC"/>

  <!-- Row: Doesn't evaluate -->
  <text x="190" y="397" text-anchor="end" fill="#104860" font-size="9">Doesn't evaluate</text>
  <circle cx="270" cy="393" r="5" fill="#D0C8BC"/><circle cx="320" cy="393" r="5" fill="#D0C8BC"/><circle cx="370" cy="393" r="5" fill="#D0C8BC"/>
  <circle cx="420" cy="393" r="5" fill="#D0C8BC"/><circle cx="470" cy="393" r="5" fill="#1890A8"/><circle cx="520" cy="393" r="5" fill="#1890A8"/>
  <circle cx="570" cy="393" r="5" fill="#1890A8"/>

  <!-- Row: Trusting untrusted output -->
  <text x="190" y="413" text-anchor="end" fill="#801840" font-size="9">Trusting untrusted</text>
  <circle cx="270" cy="409" r="5" fill="#C03468"/><circle cx="320" cy="409" r="5" fill="#D0C8BC"/><circle cx="370" cy="409" r="5" fill="#D0C8BC"/>
  <circle cx="420" cy="409" r="5" fill="#C03468"/><circle cx="470" cy="409" r="5" fill="#D0C8BC"/><circle cx="520" cy="409" r="5" fill="#D0C8BC"/>
  <circle cx="570" cy="409" r="5" fill="#D0C8BC"/>

  <!-- Legend -->
  <circle cx="680" cy="361" r="5" fill="#C04040"/>
  <text x="690" y="365" fill="#6B5E4A" font-size="9">Affected</text>
  <circle cx="680" cy="377" r="5" fill="#D0C8BC"/>
  <text x="690" y="381" fill="#6B5E4A" font-size="9">Not affected</text>
</svg>
